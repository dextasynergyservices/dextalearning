<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="DextaLearning — a behavior-driven Learning Operating System that makes deep, lasting learning the default."
    />
    <title>DextaLearning — Learning that actually sticks</title>
    <!-- Apply the saved/system theme before first paint to avoid a flash. Kept
         in sync at runtime by src/lib/theme.ts. -->
    <script>
      (() => {
        try {
          const t = localStorage.getItem("dexta-theme") || "system";
          const dark =
            t === "dark" ||
            (t === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) {
            document.documentElement.classList.add("dark");
            const m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute("content", "#0a0a0a");
          }
        } catch (_e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
